replicaCount: 1

mainApp:
  name: main-app
  image:
    repository: <+artifacts.primary.imagePath>
    tag: <+artifacts.primary.tag>
    pullPolicy: IfNotPresent
  port: 80
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

sidecar:
  name: sidecar
  image:
    repository: <+artifacts.sidecars.busybox.imagePath>
    tag: <+artifacts.sidecars.busybox.tag>
    pullPolicy: IfNotPresent
  command: ["sh", "-c", "while true; do echo 'sidecar running'; sleep 30; done"]
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

service:
  type: ClusterIP
  port: 80
